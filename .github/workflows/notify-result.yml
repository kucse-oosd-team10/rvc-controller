name: notify-result

on:
  workflow_run:
    workflows: ["CI"]
    types:
        - completed

env:
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  notify-result:
    runs-on: ubuntu-24.04
    steps:
      - name: Notify Discord
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          ACTOR="${{ github.event.workflow_run.triggering_actor.login }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          EVENT="${{ github.event.workflow_run.event }}"

          JOBS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs")

          JOBS_SUMMARY=$(echo "$JOBS_JSON" | jq -r '.jobs | map("- " + .name + ": " + (if .conclusion == "success" then "[성공]" else "[실패]" end)) | join("\\n")')

          if [ "$CONCLUSION" == "success" ]; then
            COLOR=65280
            TITLE="CI Success"
          else
            COLOR=16711680
            TITLE="CI Failed"
          fi

          PR_TITLE="${{ github.event.workflow_run.pull_requests[0].title }}"
          PR_INFO=""
          if [ -n "$PR_TITLE" ]; then
            PR_INFO="\n**PR:** $PR_TITLE"
          fi

          DESCRIPTION="**실행자:** $ACTOR\n**이벤트:** $EVENT ($BRANCH)$PR_INFO\n**상태:** $CONCLUSION\n\n**[상세 결과]**\n$JOBS_SUMMARY\n\n[상세 로그 확인]($RUN_URL)"

          JSON_PAYLOAD=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "$TITLE",
                "description": "$DESCRIPTION",
                "color": $COLOR
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" $DISCORD_WEBHOOK
