name: dust_sustained_powerup
description: |
  Dust persists across an extended corridor (cells initially seeded at 5.0,
  far above the cleanup-per-tick rate). Every dust poll returns True so the
  3-second POWER_UP timer is renewed before it can expire. POWER_UP must be
  observed continuously past the natural 3000ms expiry.

tick_duration_ms: 100
max_ticks: 60
power_off_at_tick: 55

world:
  size: [70, 5]
  obstacles: []
  dust_threshold: 0.5
  dust:
    - {pos: [1, 2], amount: 5.0}
    - {pos: [2, 2], amount: 5.0}
    - {pos: [3, 2], amount: 5.0}
