robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: cleaner_power_at_clock_ms
    clock_ms: 200
    expected: POWER_UP
    description: POWER_UP engages on first dust event
  - kind: cleaner_power_at_clock_ms
    clock_ms: 3500
    expected: POWER_UP
    description: still POWER_UP past the natural 3s expiry (timer renewed)
  - kind: cleaner_power_at_clock_ms
    clock_ms: 5000
    expected: POWER_UP
    description: still POWER_UP at 5s — sustained as long as dust persists
  - kind: collision_count_eq
    value: 0
