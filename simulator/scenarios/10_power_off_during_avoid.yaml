name: power_off_during_avoid
description: |
  Robot enters Avoiding because of an obstacle ahead, and a
  powerOff signal arrives mid-avoidance. Controller must transition to Off
  cleanly and stop the motor and cleaner regardless of avoidance phase.

tick_duration_ms: 100
max_ticks: 8
power_off_at_tick: 3

world:
  size: [10, 5]
  obstacles:
    - [3, 2]
  dust:
    - {pos: [1, 2], amount: 1.0}
    - {pos: [2, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: final_state
    expected: "Off"
    description: powerOff during avoidance still reaches Off
  - kind: cleaner_history_contains
    power: "OFF"
    description: cleaner forced OFF on powerOff
  - kind: collision_count_eq
    value: 0
