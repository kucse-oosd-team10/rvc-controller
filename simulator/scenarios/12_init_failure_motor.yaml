name: init_failure_motor
description: |
  Motor.initialize() fails 3 times. InitializingState exhausts MAX_RETRY=3
  and transitions to ErrorState.

tick_duration_ms: 100
max_ticks: 5
power_off_at_tick: 3

world:
  size: [5, 5]
  obstacles: []
  dust: []

robot:
  start: [2, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 3, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: state_at_tick
    tick: 0
    expected: Error
    description: 3 retries exhausted → Error
  - kind: cleaner_power_at_tick
    tick: 0
    expected: "OFF"
    description: ErrorState forces cleaner OFF
  - kind: collision_count_eq
    value: 0
