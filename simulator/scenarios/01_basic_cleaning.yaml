name: basic_cleaning
description: |
  Robot powers on in an empty corridor and drives forward. Verifies the
  Off → Initializing → Cleaning transition, that the cleaner is engaged at
  NORMAL power, and that dust along the path is collected.

tick_duration_ms: 100
max_ticks: 20
power_off_at_tick: 12

world:
  size: [20, 5]
  obstacles: []
  dust_threshold: 0.5
  dust:
    - {pos: [2, 2], amount: 1.0}
    - {pos: [4, 2], amount: 1.0}
    - {pos: [6, 2], amount: 1.0}
    - {pos: [8, 2], amount: 1.0}
    - {pos: [10, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates:
  off: 0.0
  normal: 0.5
  power_up: 2.0

init_failures:
  motor: 0
  cleaner: 0
  obstacle_sensor: 0
  dust_sensor: 0

assertions:
  - kind: state_at_tick
    tick: 0
    expected: Cleaning
    description: synchronous Initializing → Cleaning during powerOn
  - kind: final_state
    expected: "Off"
    description: powerOff returns the controller to Off
  - kind: cleaner_history_contains
    power: NORMAL
    description: cleaner activated at NORMAL during Cleaning
  - kind: motor_history_contains
    direction: FORWARD
    description: motor moved forward at least once
  - kind: dust_collected_at_least
    value: 2.0
    description: collected dust along the eastward path
  - kind: robot_not_collided
    description: corridor is wide open, no collisions expected
  - kind: collision_count_eq
    value: 0
