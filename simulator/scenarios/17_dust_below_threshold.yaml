name: dust_below_threshold
description: |
  Dust amount is below the detection threshold. Sensor never reports True
  so PowerUp is never engaged — cleaner stays at NORMAL.

tick_duration_ms: 100
max_ticks: 8
power_off_at_tick: 5

world:
  size: [10, 5]
  obstacles: []
  dust_threshold: 1.0
  dust:
    - {pos: [2, 2], amount: 0.5}
    - {pos: [3, 2], amount: 0.5}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: cleaner_history_contains
    power: NORMAL
  - kind: collision_count_eq
    value: 0
