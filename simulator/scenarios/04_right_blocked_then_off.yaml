name: right_blocked_then_off
description: |
  Truth table (front=T, left=F, right=T) → strategy turns
  LEFT. Verifies that powerOff during/after avoidance returns the controller
  to Off cleanly with no collision.

tick_duration_ms: 100
max_ticks: 12
power_off_at_tick: 6

world:
  size: [10, 5]
  obstacles:
    - [3, 2]
    - [3, 3]
  dust:
    - {pos: [1, 2], amount: 1.0}
    - {pos: [2, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: LEFT
    description: front+right blocked → strategy turns LEFT
  - kind: final_state
    expected: "Off"
  - kind: collision_count_eq
    value: 0
