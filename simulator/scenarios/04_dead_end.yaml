name: dead_end
description: |
  Robot drives into a 3-sided dead-end. Truth table (T,T,T) →
  backward loop until at least one side opens, then strategy decides.

tick_duration_ms: 100
max_ticks: 20
power_off_at_tick: 12

world:
  size: [8, 5]
  obstacles:
    - [5, 2]
    - [4, 1]
    - [4, 3]
  dust:
    - {pos: [3, 2], amount: 1.0}
robot:
  start: [1, 2]
  heading: E

cleaning_rates:
  off: 0.0
  normal: 0.5
  power_up: 2.0

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: BACKWARD
    description: dead-end forces a reverse step
  - kind: dust_collected_at_least
    value: 0.5
    description: dust at (3,2) was cleaned on the way in
