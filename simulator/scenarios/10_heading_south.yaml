name: heading_south
description: |
  Robot starts facing S. Forward increases y.

tick_duration_ms: 100
max_ticks: 8
power_off_at_tick: 6

world:
  size: [5, 10]
  obstacles: []
  dust:
    - {pos: [2, 4], amount: 1.0}
    - {pos: [2, 6], amount: 1.0}

robot:
  start: [2, 1]
  heading: S

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: robot_pose_at_tick
    tick: 0
    x: 2
    y: 2
    heading: S
  - kind: dust_collected_at_least
    value: 1.0
  - kind: collision_count_eq
    value: 0
