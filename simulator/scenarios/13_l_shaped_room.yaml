name: l_shaped_room
description: |
  Room is shaped like an L — internal obstacles cut off the upper-right
  quadrant. Robot drives east, hits the wall, and must turn into the
  vertical leg of the L.

tick_duration_ms: 100
max_ticks: 25
power_off_at_tick: 18

world:
  size: [10, 10]
  obstacles:
    # vertical wall at x=6 from y=0..3, plus horizontal at y=4 from x=6..9
    - [6, 0]
    - [6, 1]
    - [6, 2]
    - [6, 3]
    - [7, 4]
    - [8, 4]
    - [9, 4]
  dust:
    - {pos: [2, 2], amount: 1.0}
    - {pos: [4, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: FORWARD
  - kind: dust_collected_at_least
    value: 1.0
  - kind: robot_in_region
    region: [[0, 0], [9, 9]]
