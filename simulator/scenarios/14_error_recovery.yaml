name: error_recovery
description: |
  After 3 motor.initialize() failures the controller enters
  Error. powerOff from Error must succeed and return the controller to Off
  (no exceptions, motor stopped, cleaner OFF).

tick_duration_ms: 100
max_ticks: 5
power_off_at_tick: 2

world:
  size: [5, 5]
  obstacles: []
  dust: []

robot:
  start: [2, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 3, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: state_at_tick
    tick: 0
    expected: Error
    description: 3 retries exhausted → Error state during powerOn
  - kind: final_state
    expected: "Off"
    description: powerOff from Error returns the controller to Off
  - kind: cleaner_power_at_tick
    tick: 0
    expected: "OFF"
  - kind: collision_count_eq
    value: 0
