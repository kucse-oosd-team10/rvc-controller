name: power_off_immediate
description: |
  powerOff is invoked at tick 0 — before any tick runs. Verifies the
  immediate Cleaning → Off transition.

tick_duration_ms: 100
max_ticks: 5
power_off_at_tick: 0

world:
  size: [6, 5]
  obstacles: []
  dust:
    - {pos: [2, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: final_state
    expected: "Off"
  - kind: state_at_tick
    tick: 0
    expected: Cleaning
    description: snapshot[0] taken before powerOff fires
