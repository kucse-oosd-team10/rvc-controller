name: backward_avoidance
description: |
  Front, left and right are blocked simultaneously when the obstacle sensor
  polls. The DefaultAvoidStrategy truth table (T,T,T) routes the controller
  through a BACKWARD reverse step before turning, and the robot reverses one
  cell instead of colliding.

tick_duration_ms: 100
max_ticks: 2
power_off_at_tick: 1

world:
  size: [8, 5]
  obstacles:
    - [5, 2]
    - [4, 1]
    - [4, 3]
  dust: []

robot:
  start: [3, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: BACKWARD
    description: surrounded (T,T,T) drives BACKWARD per truth table
  - kind: collision_count_eq
    value: 0
