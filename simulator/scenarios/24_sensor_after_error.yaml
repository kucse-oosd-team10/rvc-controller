name: sensor_after_error
description: |
  Three motor.initialize() failures push the controller straight to Error
  during powerOn. Subsequent front-obstacle interrupts must be ignored — no
  avoidance motor command should be issued from Error state.

tick_duration_ms: 100
max_ticks: 6

world:
  size: [6, 5]
  obstacles: []
  dust: []

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 3, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

interrupts:
  - {tick: 1, sub_phase: before_poll}
  - {tick: 2, sub_phase: before_poll}
  - {tick: 3, sub_phase: before_poll}

assertions:
  - kind: state_at_tick
    tick: 0
    expected: Error
    description: 3 init failures → Error during powerOn
  - kind: motor_avoidance_count_eq
    value: 0
    description: Error state silences interrupt-driven avoidance
  - kind: final_state
    expected: "Off"
  - kind: collision_count_eq
    value: 0
