name: nfr01_front_interrupt
description: |
  NFR-01 derived. The front obstacle sensor delivers an interrupt at runtime
  rather than via periodic polling. We schedule onInterrupt() at tick 3
  while the robot is mid-corridor, with no real obstacle on the grid. The
  controller must observe the interrupt and enter Avoiding within 1 tick.

tick_duration_ms: 100
max_ticks: 8
power_off_at_tick: 6

world:
  size: [12, 5]
  obstacles: []
  dust: []

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

interrupts:
  - {tick: 3, sub_phase: before_poll}

assertions:
  - kind: interrupt_response_within_ticks
    interrupt_tick: 3
    max_ticks: 1
    description: NFR-01 — avoidance motor command issued within 1 tick of interrupt
  - kind: collision_count_eq
    value: 0
