name: multi_obstacle
description: |
  Two obstacles in the path. Robot must avoid the first, continue, then
  avoid the second.

tick_duration_ms: 100
max_ticks: 25
power_off_at_tick: 18

world:
  size: [12, 6]
  obstacles:
    - [4, 3]
    - [8, 3]
  dust:
    - {pos: [2, 3], amount: 1.0}
    - {pos: [3, 3], amount: 1.0}

robot:
  start: [1, 3]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: LEFT
  - kind: motor_history_contains
    direction: FORWARD
  - kind: dust_collected_at_least
    value: 1.0
  - kind: robot_in_region
    region: [[0, 0], [11, 5]]
