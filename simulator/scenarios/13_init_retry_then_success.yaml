name: init_retry_then_success
description: |
  Motor.initialize() fails twice then succeeds on the 3rd
  attempt. Controller must reach Cleaning rather than Error since MAX_RETRY=3.

tick_duration_ms: 100
max_ticks: 10
power_off_at_tick: 6

world:
  size: [8, 5]
  obstacles: []
  dust:
    - {pos: [3, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}
init_failures: {motor: 2, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: state_at_tick
    tick: 0
    expected: Cleaning
    description: third initialize() succeeds → Cleaning during powerOn
  - kind: motor_history_contains
    direction: FORWARD
    description: cleaning resumes normally after retries
  - kind: collision_count_eq
    value: 0
