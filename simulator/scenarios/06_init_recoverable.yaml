name: init_recoverable
description: |
  Motor.initialize() fails twice but the third retry succeeds. The
  controller should still reach Cleaning before tick 0.

tick_duration_ms: 100
max_ticks: 8
power_off_at_tick: 4

world:
  size: [10, 5]
  obstacles: []
  dust:
    - {pos: [3, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 2, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: state_at_tick
    tick: 0
    expected: Cleaning
    description: third retry succeeds → Cleaning before snapshot[0]
  - kind: motor_history_contains
    direction: FORWARD
  - kind: collision_count_eq
    value: 0
