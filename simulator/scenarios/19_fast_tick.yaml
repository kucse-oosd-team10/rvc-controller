name: fast_tick
description: |
  50ms tick duration. Verifies that tick rate is independent of behavior —
  trajectory does not depend on real-time pacing.

tick_duration_ms: 50
max_ticks: 12
power_off_at_tick: 8

world:
  size: [10, 5]
  obstacles: []
  dust:
    - {pos: [3, 2], amount: 1.0}
    - {pos: [5, 2], amount: 1.0}

robot:
  start: [1, 2]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: FORWARD
  - kind: dust_collected_at_least
    value: 1.0
  - kind: collision_count_eq
    value: 0
