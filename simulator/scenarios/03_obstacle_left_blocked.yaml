name: obstacle_left_blocked
description: |
  Front and left blocked, right open. Truth table (T,T,F) → turn RIGHT.

tick_duration_ms: 100
max_ticks: 15
power_off_at_tick: 8

world:
  size: [6, 6]
  obstacles:
    - [4, 2]
    - [3, 1]
  dust:
    - {pos: [3, 3], amount: 1.0}
robot:
  start: [1, 2]
  heading: E

cleaning_rates:
  off: 0.0
  normal: 0.5
  power_up: 2.0

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: RIGHT
    description: avoidance turned right per (T,T,F) rule
  - kind: collision_count_eq
    value: 0
