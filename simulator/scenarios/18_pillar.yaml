name: pillar
description: |
  A 2x2 pillar in the middle of an open room. Robot navigates around it.

tick_duration_ms: 100
max_ticks: 25
power_off_at_tick: 18

world:
  size: [10, 8]
  obstacles:
    - [5, 3]
    - [5, 4]
    - [6, 3]
    - [6, 4]
  dust:
    - {pos: [2, 4], amount: 1.0}
    - {pos: [3, 4], amount: 1.0}

robot:
  start: [1, 4]
  heading: E

cleaning_rates: {off: 0.0, normal: 0.5, power_up: 2.0}

init_failures: {motor: 0, cleaner: 0, obstacle_sensor: 0, dust_sensor: 0}

assertions:
  - kind: motor_history_contains
    direction: LEFT
    description: avoidance turns LEFT (T,F,?)
  - kind: dust_collected_at_least
    value: 1.0
  - kind: robot_in_region
    region: [[0, 0], [9, 7]]
