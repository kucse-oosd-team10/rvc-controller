# ── SonarCloud Configuration ──
sonar.organization=kucse-oosd-team10
sonar.projectKey=kucse-oosd-team10_rvc-controller
sonar.projectName=rvc-controller

# Source
sonar.sources=src,include
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C++ specifics
sonar.cfamily.compile-commands=build/dev/compile_commands.json

# Coverage (lcov format from llvm-cov)
sonar.coverageReportPaths=coverage-report/lcov.info

# cppcheck external report
sonar.cxx.cppcheck.reportPaths=cppcheck-report.xml

# Exclusions
sonar.exclusions=build/**,coverage-report/**
sonar.test.inclusions=tests/**